<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factor Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{ --paper:#F2F7FA; --grid-line:#D5E4EC; --ink:#1F3540; --ink-soft:#5A7280; --panel:#fff;
    --copper:#C2622E; --amber:#FFB02E; --green:#2E8B6A; --red:#D6493E; --blue:#3A7CA5; --purple:#7B5EA7; --shadow:rgba(31,53,64,.14); }
  body{ font-family:'Karla',sans-serif; color:var(--ink); background:linear-gradient(135deg,#EAF2F7,#F4EFEA); min-height:100vh; padding:1.25rem; }
  .wrap{ max-width:880px; margin:0 auto; }
  header{ text-align:center; margin-bottom:1rem; }
  h1{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:clamp(1.7rem,4vw,2.4rem); }
  .subtitle{ color:var(--ink-soft); margin-top:.25rem; }
  .tabs{ display:flex; justify-content:center; gap:.5rem; margin-top:.8rem; flex-wrap:wrap; }
  .card{ background:var(--panel); border-radius:16px; box-shadow:0 6px 18px var(--shadow); padding:1.1rem; margin-bottom:1rem; }
  .btn{ font-family:'Karla',sans-serif; font-weight:700; font-size:.85rem; border:2px solid var(--ink); border-radius:999px;
    background:#fff; color:var(--ink); padding:.45rem 1rem; cursor:pointer; transition:all .15s; touch-action:manipulation; }
  .btn:hover{ background:var(--ink); color:#fff; } .btn.on{ background:var(--ink); color:#fff; }
  .btn:focus-visible{ outline:3px solid var(--amber); outline-offset:2px; }
  .tool-tabs{ display:flex; gap:.4rem; flex-wrap:wrap; justify-content:center; margin-bottom:1rem; }
  .tool-tabs .btn{ font-size:.78rem; padding:.35rem .75rem; }
  .panel-h{ font-family:'Space Grotesk',sans-serif; font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:.12em; color:var(--ink-soft); margin-bottom:.6rem; }
  .inrow{ display:flex; gap:.6rem; align-items:center; flex-wrap:wrap; justify-content:center; margin-bottom:1rem; }
  .inrow label{ font-weight:700; } .inrow input{ width:90px; text-align:center; font-family:'Space Grotesk',sans-serif; font-size:1.2rem; font-weight:700;
    border:2px solid var(--grid-line); border-radius:8px; padding:.3rem; color:var(--ink); }
  .inrow input:focus{ outline:none; border-color:var(--blue); }
  #tree{ width:100%; height:auto; display:block; }
  .result{ text-align:center; }
  .result .ans{ font-family:'Space Grotesk',sans-serif; font-size:1.5rem; font-weight:700; color:var(--green); margin-top:.4rem; }
  .result .ans sup{ font-size:.65em; }
  .work{ font-size:.88rem; color:var(--ink-soft); line-height:1.6; margin-top:.7rem; background:var(--paper); border-radius:10px; padding:.7rem .9rem; }
  .work b{ color:var(--ink); } .work .sym{ color:var(--blue); font-weight:700; }
  .grid-sq{ display:flex; justify-content:center; gap:1.5rem; flex-wrap:wrap; align-items:flex-end; margin:1rem 0; }
  /* quiz shared */
  .quiz-card{ max-width:600px; margin:0 auto; }
  .qprog{ display:flex; gap:.3rem; justify-content:center; margin-bottom:1rem; }
  .qprog .dot{ width:11px; height:11px; border-radius:50%; background:var(--grid-line); }
  .qprog .dot.now{ background:var(--ink); } .qprog .dot.right{ background:var(--green); } .qprog .dot.wrong{ background:var(--red); }
  .qtext{ font-family:'Space Grotesk',sans-serif; font-size:1.2rem; font-weight:500; text-align:center; margin-bottom:1rem; }
  .opts{ display:grid; grid-template-columns:1fr 1fr; gap:.6rem; }
  .opt{ font-family:'Space Grotesk',sans-serif; font-size:1.05rem; font-weight:700; padding:.8rem; border:2px solid var(--grid-line);
    border-radius:12px; background:var(--paper); cursor:pointer; transition:all .12s; touch-action:manipulation; }
  .opt:hover:not(:disabled){ border-color:var(--ink); } .opt:disabled{ cursor:default; }
  .opt.correct{ border-color:var(--green); background:#DDF2E9; } .opt.incorrect{ border-color:var(--red); background:#FBE3E1; }
  .explain{ margin-top:.9rem; padding:.75rem .9rem; border-radius:12px; background:#FFF6E3; border:2px solid var(--amber); font-size:.95rem; line-height:1.5; display:none; }
  .quiz-foot{ display:flex; justify-content:space-between; align-items:center; margin-top:1rem; } .score-pill{ font-weight:700; color:var(--ink-soft); }
  .result-screen{ text-align:center; padding:1rem 0; } .result-screen .big{ font-size:3rem; } .result-screen h3{ font-family:'Space Grotesk',sans-serif; font-size:1.5rem; margin:.5rem 0; }
  footer{ text-align:center; color:var(--ink-soft); font-size:.78rem; margin-top:.5rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🌳 Factor Lab</h1>
    <p class="subtitle">Break numbers into primes, find HCF and LCM, and explore squares, cubes and roots.</p>
    <div class="tabs"><button class="btn on" id="tabPlay">Explore</button><button class="btn" id="tabQuiz">🎓 Review quiz</button></div>
  </header>

  <section id="playMode">
    <div class="card">
      <div class="tool-tabs" id="toolTabs">
        <button class="btn on" data-tool="tree">Prime factor tree</button>
        <button class="btn" data-tool="hcflcm">HCF &amp; LCM</button>
        <button class="btn" data-tool="powers">Squares, cubes &amp; roots</button>
        <button class="btn" data-tool="solve">Solve x² = k</button>
      </div>
      <div id="toolBody"></div>
    </div>
  </section>

  <section id="quizMode" style="display:none"><div class="card quiz-card" id="quizCard"></div></section>
  <footer>Factor Lab · part of the little tutoring tools family</footer>
</div>

<script>
"use strict";
const SVGNS="http://www.w3.org/2000/svg";
const $=id=>document.getElementById(id);
function el(n,a,p){const e=document.createElementNS(SVGNS,n);for(const k in a)e.setAttribute(k,a[k]);if(p)p.appendChild(e);return e;}
let tool='tree';

function primeFactors(n){ const f=[]; let d=2; n=Math.abs(n); while(d*d<=n){ while(n%d===0){f.push(d);n/=d;} d++; } if(n>1)f.push(n); return f; }
function factorPowers(n){ const f=primeFactors(n); const m={}; f.forEach(p=>m[p]=(m[p]||0)+1); return m; }
function powStr(m){ return Object.keys(m).map(p=>m[p]>1?`${p}<sup>${m[p]}</sup>`:`${p}`).join(' × ')||'1'; }

/* ---------- factor tree ---------- */
let treeN=60;
function renderTree(){
  $('toolBody').innerHTML=`
    <div class="panel-h">Build a prime factor tree</div>
    <div class="inrow"><label>Number <input id="tN" type="number" value="${treeN}" min="2" max="999"></label>
      <button class="btn" id="tGo">Build tree</button></div>
    <svg id="tree" viewBox="0 0 600 320" aria-label="Factor tree"></svg>
    <div class="result" id="tRes"></div>`;
  $('tN').addEventListener('input',e=>{ treeN=Math.max(2,Math.min(999,parseInt(e.target.value)||2)); drawTree(); });
  $('tGo').addEventListener('click',drawTree);
  drawTree();
}
function buildTreeData(n,x,y,dx){
  const node={n,x,y,children:null};
  if(isPrime(n)) return node;
  // pick smallest prime factor
  let p=2; while(n%p!==0)p++;
  const other=n/p;
  node.children=[ buildTreeData(p,x-dx,y+80,dx/1.8), buildTreeData(other,x+dx,y+80,dx/1.8) ];
  return node;
}
function isPrime(n){ if(n<2)return false; for(let i=2;i*i<=n;i++)if(n%i===0)return false; return true; }
function drawTree(){
  const svg=$('tree'); svg.innerHTML='';
  const root=buildTreeData(treeN,300,30,150);
  (function draw(node){
    if(node.children) node.children.forEach(c=>{ el('line',{x1:node.x,y1:node.y+14,x2:c.x,y2:c.y-14,stroke:'var(--ink-soft)','stroke-width':2},svg); draw(c); });
    const prime=isPrime(node.n);
    el('circle',{cx:node.x,cy:node.y,r:18,fill:prime?'var(--copper)':'var(--panel)',stroke:'var(--ink)','stroke-width':2.5},svg);
    const t=el('text',{x:node.x,y:node.y+5,'text-anchor':'middle','font-family':'Space Grotesk','font-size':'15px','font-weight':'700',fill:prime?'#fff':'var(--ink)'},svg); t.textContent=node.n;
  })(root);
  const m=factorPowers(treeN);
  $('tRes').innerHTML=`<div class="ans">${treeN} = ${powStr(m)}</div>
    <div class="work">Keep splitting into factors until every leaf is <b style="color:var(--copper)">prime</b> (the orange circles). Collecting them: ${treeN} = ${primeFactors(treeN).join(' × ')}${Object.values(m).some(v=>v>1)?` = ${powStr(m)}`:''}.</div>`;
}

/* ---------- HCF & LCM ---------- */
let aN=24,bN=36;
function renderHL(){
  $('toolBody').innerHTML=`
    <div class="panel-h">Highest Common Factor &amp; Lowest Common Multiple</div>
    <div class="inrow"><input id="hA" type="number" value="${aN}" min="2" max="200"><span style="font-weight:700;color:var(--ink-soft)">and</span><input id="hB" type="number" value="${bN}" min="2" max="200"></div>
    <svg id="tree" viewBox="0 0 600 260" aria-label="Venn diagram of prime factors"></svg>
    <div class="result" id="hRes"></div>`;
  $('hA').addEventListener('input',e=>{ aN=Math.max(2,parseInt(e.target.value)||2); drawHL(); });
  $('hB').addEventListener('input',e=>{ bN=Math.max(2,parseInt(e.target.value)||2); drawHL(); });
  drawHL();
}
function drawHL(){
  const svg=$('tree'); svg.innerHTML='';
  // multiset prime factors
  const fa=primeFactors(aN), fb=primeFactors(bN);
  const common=[]; const ca=fa.slice(), cb=fb.slice();
  for(let i=0;i<ca.length;i++){ const idx=cb.indexOf(ca[i]); if(idx>=0){ common.push(ca[i]); cb.splice(idx,1); ca[i]=null; } }
  const onlyA=ca.filter(x=>x!==null), onlyB=cb;
  // venn
  el('circle',{cx:230,cy:130,r:110,fill:'rgba(58,124,165,.12)',stroke:'var(--blue)','stroke-width':2.5},svg);
  el('circle',{cx:370,cy:130,r:110,fill:'rgba(255,176,46,.14)',stroke:'var(--amber)','stroke-width':2.5},svg);
  const tx=(x,y,arr,col)=>{ const t=el('text',{x,y,'text-anchor':'middle','font-family':'Space Grotesk','font-size':'18px','font-weight':'700',fill:col},svg); t.textContent=arr.length?arr.join(', '):'—'; };
  el('text',{x:160,y:40,'text-anchor':'middle','font-weight':'700','font-size':'14px',fill:'var(--blue)'},svg).textContent=aN;
  el('text',{x:440,y:40,'text-anchor':'middle','font-weight':'700','font-size':'14px',fill:'var(--amber)'},svg).textContent=bN;
  tx(165,135,onlyA,'var(--blue)'); tx(300,135,common,'var(--ink)'); tx(435,135,onlyB,'var(--copper)');
  el('text',{x:300,y:235,'text-anchor':'middle','font-size':'12px',fill:'var(--ink-soft)'},svg).textContent='shared primes (middle) → HCF · everything → LCM';
  const hcf=common.reduce((a,b)=>a*b,1);
  const lcm=aN*bN/hcf;
  $('hRes').innerHTML=`<div class="ans">HCF = ${hcf} &nbsp;·&nbsp; LCM = ${lcm}</div>
    <div class="work"><b>HCF</b> = product of the shared primes in the middle = ${common.length?common.join(' × ')+' = ':''}<b>${hcf}</b>.<br>
    <b>LCM</b> = multiply everything in the diagram (shared once + each side) = <b>${lcm}</b>.<br>
    Quick check: HCF × LCM = ${hcf} × ${lcm} = ${hcf*lcm} = ${aN} × ${bN}. ✓</div>`;
}

/* ---------- powers & roots ---------- */
let pwN=7;
function renderPowers(){
  $('toolBody').innerHTML=`
    <div class="panel-h">Squares, cubes and roots</div>
    <div class="inrow"><label>n = <input id="pN" type="number" value="${pwN}" min="1" max="20"></label></div>
    <div class="grid-sq" id="pVis"></div>
    <div class="result" id="pRes"></div>`;
  $('pN').addEventListener('input',e=>{ pwN=Math.max(1,Math.min(20,parseInt(e.target.value)||1)); drawPowers(); });
  drawPowers();
}
function drawPowers(){
  const n=pwN, sq=n*n, cube=n*n*n;
  // draw n x n grid of dots
  const vis=$('pVis'); const cell=Math.max(6,Math.min(16,160/n));
  let svg=`<svg width="${n*cell+4}" height="${n*cell+24}" viewBox="0 0 ${n*cell+4} ${n*cell+24}">`;
  for(let r=0;r<n;r++)for(let c=0;c<n;c++) svg+=`<rect x="${c*cell+2}" y="${r*cell+2}" width="${cell-2}" height="${cell-2}" rx="2" fill="var(--blue)"/>`;
  svg+=`<text x="${(n*cell)/2}" y="${n*cell+18}" text-anchor="middle" font-size="12" font-weight="700" fill="var(--ink-soft)">${n} × ${n} = ${sq}</text></svg>`;
  vis.innerHTML=svg;
  const rootInfo = Number.isInteger(Math.sqrt(sq))?`√${sq} = ${Math.sqrt(sq)}`:'';
  $('pRes').innerHTML=`<div class="ans">${n}² = ${sq} &nbsp;·&nbsp; ${n}³ = ${cube}</div>
    <div class="work"><b>${n} squared</b> = ${n} × ${n} = <b>${sq}</b> (the area of an ${n}×${n} square).<br>
    <b>${n} cubed</b> = ${n} × ${n} × ${n} = <b>${cube}</b> (the volume of an ${n}×${n}×${n} cube).<br>
    Roots undo powers: <span class="sym">√${sq} = ${n}</span> and <span class="sym">∛${cube} = ${n}</span>.</div>`;
}

/* ---------- solve x^2 = k ---------- */
let solveK=49;
function renderSolve(){
  $('toolBody').innerHTML=`
    <div class="panel-h">Solve x² = k</div>
    <div class="inrow"><label>x² = <input id="sK" type="number" value="${solveK}" min="0" max="400"></label></div>
    <div class="result" id="sRes"></div>`;
  $('sK').addEventListener('input',e=>{ solveK=Math.max(0,parseInt(e.target.value)||0); drawSolve(); });
  drawSolve();
}
function drawSolve(){
  const k=solveK, root=Math.sqrt(k), exact=Number.isInteger(root);
  $('sRes').innerHTML=`<div class="ans">${exact?`x = +${root} or −${root}`:`x ≈ ±${root.toFixed(2)}`}</div>
    <div class="work">To undo "squared", take the square root of both sides — and remember a square root has <b>two</b> answers, one positive and one negative, because (−${exact?root:root.toFixed(2)})² also equals ${k}.<br>
    ${exact?`√${k} = ${root}, so <b>x = ${root} or x = −${root}</b>.`:`${k} isn't a perfect square, so x ≈ ±${root.toFixed(2)}.`}</div>`;
}

document.querySelectorAll('#toolTabs .btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#toolTabs .btn').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  tool=b.dataset.tool;
  if(tool==='tree')renderTree(); else if(tool==='hcflcm')renderHL(); else if(tool==='powers')renderPowers(); else renderSolve();
}));

/* ---------- QUIZ ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function mc(text,correct,distract,explain){const opts=shuffle([correct,...distract]);return{text,opts,answer:opts.indexOf(correct),explain};}
function buildBank(){
  const Q=[];
  Q.push(mc('Which of these is a prime number?','17',['15','21','9'],'17 has no factors except 1 and itself. 15=3×5, 21=3×7, 9=3×3.'));
  Q.push(mc('Write 60 as a product of prime factors','2² × 3 × 5',['2 × 30','4 × 15','2³ × 5'],'60 = 2×2×3×5 = 2² × 3 × 5.'));
  Q.push(mc('What is 8²?','64',['16','512','24'],'8² = 8 × 8 = 64.'));
  Q.push(mc('What is 5³?','125',['15','25','75'],'5³ = 5 × 5 × 5 = 125.'));
  Q.push(mc('What is √81?','9',['9 only? +/-9','40.5','8'],'9 × 9 = 81, so √81 = 9.'));
  Q.push(mc('What is ∛27?','3',['9','27','6'],'3 × 3 × 3 = 27, so the cube root is 3.'));
  Q.push(mc('The HCF of 12 and 18 is…','6',['2','3','36'],'12=2²×3, 18=2×3². Shared: 2×3 = 6.'));
  Q.push(mc('The LCM of 4 and 6 is…','12',['24','2','10'],'Multiples of 4: 4,8,12… of 6: 6,12… first shared is 12.'));
  Q.push(mc('Solve x² = 36','x = ±6',['x = 6 only','x = 18','x = ±18'],'√36 = 6, and (−6)²=36 too, so x = ±6.'));
  Q.push(mc('Which is a square number?','49',['50','48','45'],'49 = 7². The others aren\'t whole numbers squared.'));
  Q.push(mc('What is 2⁴?','16',['8','6','12'],'2⁴ = 2×2×2×2 = 16.'));
  Q.push(mc('HCF of 15 and 25?','5',['3','75','1'],'15=3×5, 25=5². Shared prime: 5.'));
  Q.push(mc('Which of these is a prime number?','23',['27','33','21'],'23 has no factors except 1 and itself. 27=3³, 33=3×11, 21=3×7.'));
  Q.push(mc('Which of these is NOT a prime number?','9',['7','11','13'],'9 = 3×3, so it is not prime. 7, 11 and 13 are all prime.'));
  Q.push(mc('Write 24 as a product of prime factors','2³ × 3',['4 × 6','2² × 6','2 × 12'],'24 = 2×2×2×3 = 2³ × 3.'));
  Q.push(mc('Write 36 as a product of prime factors','2² × 3²',['6 × 6','4 × 9','2³ × 3'],'36 = 2×2×3×3 = 2² × 3².'));
  Q.push(mc('What is 6²?','36',['12','66','18'],'6² = 6 × 6 = 36.'));
  Q.push(mc('What is 9²?','81',['18','99','72'],'9² = 9 × 9 = 81.'));
  Q.push(mc('What is 10²?','100',['20','110','1000'],'10² = 10 × 10 = 100.'));
  Q.push(mc('What is 2³?','8',['6','9','12'],'2³ = 2 × 2 × 2 = 8.'));
  Q.push(mc('What is 3³?','27',['9','18','12'],'3³ = 3 × 3 × 3 = 27.'));
  Q.push(mc('What is 4³?','64',['12','16','48'],'4³ = 4 × 4 × 4 = 64.'));
  Q.push(mc('What is √64?','8',['32','6','16'],'8 × 8 = 64, so √64 = 8.'));
  Q.push(mc('What is √100?','10',['50','20','1000'],'10 × 10 = 100, so √100 = 10.'));
  Q.push(mc('What is √144?','12',['72','14','24'],'12 × 12 = 144, so √144 = 12.'));
  Q.push(mc('What is ∛8?','2',['4','8','3'],'2 × 2 × 2 = 8, so the cube root is 2.'));
  Q.push(mc('What is ∛64?','4',['8','16','3'],'4 × 4 × 4 = 64, so the cube root is 4.'));
  Q.push(mc('The HCF of 24 and 36 is…','12',['6','72','4'],'24=2³×3, 36=2²×3². Shared: 2²×3 = 12.'));
  Q.push(mc('The HCF of 8 and 12 is…','4',['2','24','1'],'8=2³, 12=2²×3. Shared: 2² = 4.'));
  Q.push(mc('The LCM of 3 and 5 is…','15',['8','30','1'],'Multiples of 3: 3,6,9,12,15… of 5: 5,10,15… first shared is 15.'));
  Q.push(mc('The LCM of 6 and 8 is…','24',['48','14','12'],'6=2×3, 8=2³. LCM = 2³×3 = 24.'));
  Q.push(mc('Solve x² = 25','x = ±5',['x = 5 only','x = 12.5','x = ±12.5'],'√25 = 5, and (−5)²=25, so x = ±5.'));
  Q.push(mc('Solve x² = 100','x = ±10',['x = 10 only','x = 50','x = ±50'],'√100 = 10, and (−10)²=100, so x = ±10.'));
  Q.push(mc('Which of these is a cube number?','27',['9','16','25'],'27 = 3³. The others (9, 16, 25) are square numbers, not cubes.'));
  Q.push(mc('What are the prime factors of 30?','2, 3 and 5',['2, 3 and 6','5 and 6','1, 2 and 15'],'30 = 2 × 3 × 5 — all three are prime.'));
  return shuffle(Q);
}
const QLEN=8; let quiz=null;
function startQuiz(){ quiz={qs:buildBank().slice(0,QLEN),idx:0,score:0,results:[]}; renderQ(); }
function renderQ(){
  const q=quiz.qs[quiz.idx], c=$('quizCard');
  let dots=''; for(let i=0;i<QLEN;i++){let cl='dot';if(i<quiz.results.length)cl+=quiz.results[i]?' right':' wrong';else if(i===quiz.idx)cl+=' now';dots+=`<span class="${cl}"></span>`;}
  c.innerHTML=`<div class="qprog">${dots}</div><div class="qtext">${q.text}</div>
    <div class="opts">${q.opts.map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join('')}</div>
    <div class="explain" id="ex"></div>
    <div class="quiz-foot"><span class="score-pill">Score: ${quiz.score}/${quiz.results.length}</span><button class="btn" id="nx" style="display:none">Next →</button></div>`;
  c.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',()=>{
    const i=+b.dataset.i, right=i===q.answer; quiz.results.push(right); if(right)quiz.score++;
    c.querySelectorAll('.opt').forEach((x,j)=>{x.disabled=true;if(j===q.answer)x.classList.add('correct');else if(j===i)x.classList.add('incorrect');});
    const ex=$('ex'); ex.style.display='block'; ex.innerHTML=(right?'✅ ':'❌ ')+q.explain;
    c.querySelector('.score-pill').textContent=`Score: ${quiz.score}/${quiz.results.length}`;
    const nx=$('nx'); nx.style.display='inline-block'; nx.textContent=quiz.idx+1<QLEN?'Next →':'Results →';
    nx.onclick=()=>{ quiz.idx++; if(quiz.idx<QLEN)renderQ(); else results(); };
  }));
}
function results(){
  const pct=quiz.score/QLEN; let e='🌳',t='Prime time!';
  if(pct<0.5){e='🌱';t='Keep growing!';} else if(pct<0.8){e='🍃';t='Good work!';}
  $('quizCard').innerHTML=`<div class="result-screen"><div class="big">${e}</div><h3>${t}</h3>
    <p style="color:var(--ink-soft)">You scored ${quiz.score} out of ${QLEN}.</p>
    <button class="btn" id="rt">Try again</button> <button class="btn" id="bk">Back to explore</button></div>`;
  $('rt').onclick=startQuiz; $('bk').onclick=()=>setMode('play');
}
function setMode(m){
  $('playMode').style.display=m==='play'?'':'none'; $('quizMode').style.display=m==='play'?'none':'';
  $('tabPlay').classList.toggle('on',m==='play'); $('tabQuiz').classList.toggle('on',m!=='play');
  if(m!=='play') startQuiz();
}
$('tabPlay').onclick=()=>setMode('play'); $('tabQuiz').onclick=()=>setMode('quiz');

renderTree();
</script>
