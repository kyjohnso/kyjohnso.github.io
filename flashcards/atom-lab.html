<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atom Lab — Build an Atom</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --paper:#F2F7FA; --grid-line:#D5E4EC; --ink:#1F3540; --ink-soft:#5A7280;
    --panel:#fff; --proton:#D6493E; --neutron:#5A7280; --electron:#3A7CA5;
    --amber:#FFB02E; --green:#2E8B6A; --shadow:rgba(31,53,64,.14);
  }
  body { font-family:'Karla',sans-serif; color:var(--ink);
    background:linear-gradient(135deg,#EAF2F7 0%,#F4EFEA 100%); min-height:100vh; padding:1.25rem; }
  .wrap { max-width:980px; margin:0 auto; }
  header { text-align:center; margin-bottom:1rem; }
  h1 { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:clamp(1.7rem,4vw,2.4rem); }
  .subtitle { color:var(--ink-soft); margin-top:.25rem; }
  .grid { display:grid; grid-template-columns:1fr 300px; gap:1rem; align-items:start; }
  @media (max-width:820px){ .grid{ grid-template-columns:1fr; } }
  .card { background:var(--panel); border-radius:16px; box-shadow:0 6px 18px var(--shadow); padding:1rem; }
  #atom { width:100%; height:auto; display:block; }

  .controls { display:flex; flex-direction:column; gap:.85rem; }
  .ctrl { display:flex; align-items:center; gap:.6rem; }
  .ctrl .dot { width:18px; height:18px; border-radius:50%; flex:0 0 auto; }
  .ctrl .nm { font-weight:700; flex:1; }
  .ctrl .nm small { display:block; color:var(--ink-soft); font-weight:400; font-size:.75rem; }
  .step { width:34px; height:34px; border-radius:10px; border:2px solid var(--ink); background:#fff;
    font-size:1.2rem; font-weight:700; cursor:pointer; line-height:1; touch-action:manipulation; color:var(--ink); }
  .step:hover { background:var(--ink); color:#fff; }
  .count { width:42px; text-align:center; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.3rem; }

  .panel-h { font-family:'Space Grotesk',sans-serif; font-size:.8rem; font-weight:700;
    text-transform:uppercase; letter-spacing:.12em; color:var(--ink-soft); margin-bottom:.6rem; }
  .identity { text-align:center; margin-bottom:.8rem; }
  .sym-badge { display:inline-flex; flex-direction:column; align-items:center; justify-content:center;
    width:96px; height:96px; border-radius:16px; border:3px solid var(--ink); background:var(--paper); }
  .sym-badge .z { align-self:flex-start; margin:4px 0 0 8px; font-size:.8rem; color:var(--ink-soft); font-weight:700; }
  .sym-badge .sym { font-family:'Space Grotesk',sans-serif; font-size:2.1rem; font-weight:700; line-height:1; margin-top:-6px; }
  .ename { font-family:'Space Grotesk',sans-serif; font-size:1.2rem; font-weight:700; margin-top:.4rem; }
  .iso { font-family:'Space Grotesk',sans-serif; font-size:1.15rem; margin-top:.3rem; }
  .iso sup, .iso sub { font-size:.62em; }

  .ro { display:flex; justify-content:space-between; font-size:.92rem; padding:.22rem 0; border-top:1px dashed var(--grid-line); }
  .ro:first-child { border-top:none; }
  .ro b { font-variant-numeric:tabular-nums; }
  .tag { display:inline-block; font-size:.78rem; font-weight:700; padding:.15rem .55rem; border-radius:999px; }
  .tag.neutral { background:#DDF2E9; color:var(--green); }
  .tag.ion { background:#FFF6E3; color:var(--amber); }
  .eqs { margin-top:.8rem; font-size:.84rem; line-height:1.5; color:var(--ink-soft); }
  .eqs b { color:var(--ink); }

  .preset-row { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.6rem; }
  .btn { font-family:'Karla',sans-serif; font-weight:700; font-size:.8rem; border:2px solid var(--ink);
    border-radius:999px; background:#fff; color:var(--ink); padding:.3rem .7rem; cursor:pointer;
    transition:all .15s; touch-action:manipulation; }
  .btn:hover { background:var(--ink); color:#fff; }
  footer { text-align:center; color:var(--ink-soft); font-size:.78rem; margin-top:1rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⚛️ Atom Lab</h1>
    <p class="subtitle">Add protons, neutrons and electrons — the atom tells you what it has become.</p>
  </header>

  <div class="grid">
    <div class="card">
      <svg id="atom" viewBox="0 0 560 460" aria-label="Atom diagram"></svg>
      <div class="controls" style="flex-direction:row;justify-content:space-around;margin-top:.5rem">
        <div class="ctrl" style="flex-direction:column;gap:.3rem">
          <span class="dot" style="background:var(--proton)"></span>
          <button class="step" data-part="p" data-d="1">+</button>
          <span class="count" id="cp">0</span>
          <button class="step" data-part="p" data-d="-1">−</button>
          <small style="color:var(--ink-soft);font-weight:700">protons</small>
        </div>
        <div class="ctrl" style="flex-direction:column;gap:.3rem">
          <span class="dot" style="background:var(--neutron)"></span>
          <button class="step" data-part="n" data-d="1">+</button>
          <span class="count" id="cn">0</span>
          <button class="step" data-part="n" data-d="-1">−</button>
          <small style="color:var(--ink-soft);font-weight:700">neutrons</small>
        </div>
        <div class="ctrl" style="flex-direction:column;gap:.3rem">
          <span class="dot" style="background:var(--electron)"></span>
          <button class="step" data-part="e" data-d="1">+</button>
          <span class="count" id="ce">0</span>
          <button class="step" data-part="e" data-d="-1">−</button>
          <small style="color:var(--ink-soft);font-weight:700">electrons</small>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="panel-h">What you've built</div>
      <div class="identity" id="identity"></div>
      <div id="readouts"></div>
      <div class="eqs" id="eqs"></div>
      <div class="preset-row" id="presets"></div>
    </div>
  </div>
  <footer>Atom Lab · part of the little tutoring tools family · elements 1–20</footer>
</div>

<script>
"use strict";
const SVGNS="http://www.w3.org/2000/svg";
const $=id=>document.getElementById(id);
// first 20 elements: symbol, name, common neutron count (most abundant isotope)
const EL = [
  ['H','Hydrogen',0],['He','Helium',2],['Li','Lithium',4],['Be','Beryllium',5],['B','Boron',6],
  ['C','Carbon',6],['N','Nitrogen',7],['O','Oxygen',8],['F','Fluorine',10],['Ne','Neon',10],
  ['Na','Sodium',12],['Mg','Magnesium',12],['Al','Aluminium',14],['Si','Silicon',14],['P','Phosphorus',16],
  ['S','Sulfur',16],['Cl','Chlorine',18],['Ar','Argon',22],['K','Potassium',20],['Ca','Calcium',20]
];
const SHELLS = [2,8,8,2];
let p=6, n=6, e=6;   // start as carbon-12

function clampParts(){ p=Math.max(0,Math.min(20,p)); n=Math.max(0,Math.min(24,n)); e=Math.max(0,Math.min(20,e)); }

function el(name,attrs,parent){const x=document.createElementNS(SVGNS,name);for(const k in attrs)x.setAttribute(k,attrs[k]);if(parent)parent.appendChild(x);return x;}

function distributeShells(count){
  const out=[]; let left=count;
  for(const cap of SHELLS){ if(left<=0)break; const here=Math.min(cap,left); out.push(here); left-=here; }
  if(left>0) out.push(left); // overflow (beyond model) — shown but flagged
  return out;
}

function drawAtom(){
  const svg=$('atom'); svg.innerHTML='';
  const defs=el('defs',{},svg);
  const glow=el('filter',{id:'g',x:'-60%',y:'-60%',width:'220%',height:'220%'},defs);
  el('feGaussianBlur',{stdDeviation:5},glow);
  const cx=250, cy=230;

  // electron shells
  const shells=distributeShells(e);
  const maxShell=Math.max(shells.length, 1);
  const baseR=60, stepR=42;
  for(let i=0;i<Math.max(shells.length, e>0?1:0);i++){
    const r=baseR+i*stepR;
    el('circle',{cx,cy,r,fill:'none',stroke:'var(--grid-line)','stroke-width':2},svg);
  }
  // nucleus cluster (protons + neutrons packed)
  const total=p+n;
  const nucG=el('g',{},svg);
  const positions=packNucleus(total);
  const scale=total>16?0.8:1;
  let idx=0;
  // interleave protons & neutrons for a mixed look
  const order=[];
  for(let i=0;i<Math.max(p,n);i++){ if(i<p)order.push('p'); if(i<n)order.push('n'); }
  positions.forEach((pos,i)=>{
    const kind=order[i]||'p';
    el('circle',{cx:cx+pos[0]*scale, cy:cy+pos[1]*scale, r:9*scale,
      fill:kind==='p'?'var(--proton)':'var(--neutron)', stroke:'#fff','stroke-width':1.5},nucG);
  });
  if(total===0){ const t=el('text',{x:cx,y:cy+5,'text-anchor':'middle',fill:'var(--ink-soft)','font-size':'14px'},svg); t.textContent='(empty nucleus)'; }

  // electrons on shells
  shells.forEach((cnt,si)=>{
    const r=baseR+si*stepR;
    for(let k=0;k<cnt;k++){
      const ang=(k/cnt)*2*Math.PI - Math.PI/2 + si*0.4;
      el('circle',{cx:cx+r*Math.cos(ang), cy:cy+r*Math.sin(ang), r:7,
        fill:'var(--electron)', stroke:'#fff','stroke-width':1.5, filter:'url(#g)'},svg);
      el('circle',{cx:cx+r*Math.cos(ang), cy:cy+r*Math.sin(ang), r:7,
        fill:'var(--electron)', stroke:'#fff','stroke-width':1.5},svg);
    }
  });

  // shell-count caption
  if(e>0){
    const cap=el('text',{x:cx, y:445, 'text-anchor':'middle','font-size':'13px','font-weight':'700', fill:'var(--ink-soft)'},svg);
    cap.textContent='electron arrangement: '+shells.join(', ');
  }
}

function packNucleus(total){
  // spiral packing
  const pts=[]; if(total===0)return pts;
  pts.push([0,0]); let placed=1, ring=1;
  while(placed<total){
    const inRing=Math.min(total-placed, ring*6);
    for(let i=0;i<inRing;i++){
      const ang=(i/inRing)*2*Math.PI;
      pts.push([ring*16*Math.cos(ang), ring*16*Math.sin(ang)]);
    }
    placed+=inRing; ring++;
  }
  return pts;
}

function render(){
  clampParts();
  $('cp').textContent=p; $('cn').textContent=n; $('ce').textContent=e;
  drawAtom();

  const Z=p, A=p+n, charge=p-e;
  const elem = Z>=1 && Z<=20 ? EL[Z-1] : null;
  const ident=$('identity');
  if(!elem){
    ident.innerHTML = Z===0
      ? '<div class="ename" style="color:var(--ink-soft)">No protons yet — add one to start an element</div>'
      : '<div class="ename" style="color:var(--ink-soft)">'+Z+' protons is beyond our 1–20 table</div>';
  } else {
    ident.innerHTML = `<div class="sym-badge"><span class="z">${Z}</span><span class="sym">${elem[0]}</span></div>
      <div class="ename">${elem[1]}</div>
      <div class="iso"><sup>${A}</sup><sub>${Z}</sub>${elem[0]}${charge!==0?'<sup>'+Math.abs(charge)+(charge>0?'+':'−')+'</sup>':''}</div>`;
  }

  // readouts
  const ro=$('readouts');
  const isNeutral = charge===0;
  let ionName='';
  if(charge>0) ionName = `${Math.abs(charge)}+ ion (cation)`;
  else if(charge<0) ionName = `${Math.abs(charge)}− ion (anion)`;
  ro.innerHTML =
    `<div class="ro"><span>Atomic number (Z)</span><b>${Z}</b></div>
     <div class="ro"><span>Mass number (A)</span><b>${A}</b></div>
     <div class="ro"><span>Overall charge</span><b>${charge>0?'+':''}${charge}</b></div>
     <div class="ro"><span>Status</span><b>${isNeutral?'<span class="tag neutral">neutral atom</span>':'<span class="tag ion">'+ionName+'</span>'}</b></div>`;

  // is it the common isotope?
  let isoNote='';
  if(elem){
    const commonN=elem[2];
    if(n===commonN) isoNote = `This is the most common isotope of ${elem[1]}.`;
    else isoNote = `This is an isotope of ${elem[1]} — same protons (${Z}), but ${n} neutrons instead of the usual ${commonN}.`;
  }

  $('eqs').innerHTML =
    `<div><b>Atomic number</b> = number of protons = <b>${Z}</b></div>
     <div><b>Mass number</b> = protons + neutrons = ${p} + ${n} = <b>${A}</b></div>
     <div><b>Charge</b> = protons − electrons = ${p} − ${e} = <b>${charge>0?'+':''}${charge}</b></div>
     ${isoNote?'<div style="margin-top:.4rem">'+isoNote+'</div>':''}
     ${distributeShells(e).length>SHELLS.length?'<div style="color:var(--proton);margin-top:.3rem">(too many electrons for the simple 2,8,8,2 shell model)</div>':''}`;
}

/* presets */
const PRESETS=[['Carbon-12',6,6,6],['Oxygen',8,8,8],['Sodium ion Na⁺',11,12,10],['Chloride Cl⁻',17,18,18],['Helium',2,2,2],['Carbon-14',6,8,6]];
function buildPresets(){
  const row=$('presets');
  row.innerHTML='<div style="width:100%;font-size:.75rem;color:var(--ink-soft);font-weight:700;text-transform:uppercase;letter-spacing:.1em">Try these</div>';
  PRESETS.forEach(([name,pp,nn,ee])=>{
    const b=document.createElement('button'); b.className='btn'; b.textContent=name;
    b.addEventListener('click',()=>{ p=pp;n=nn;e=ee; render(); });
    row.appendChild(b);
  });
}

document.querySelectorAll('.step').forEach(b=>b.addEventListener('click',()=>{
  const d=+b.dataset.d;
  if(b.dataset.part==='p')p+=d; else if(b.dataset.part==='n')n+=d; else e+=d;
  render();
}));
buildPresets();
render();
</script>
</body>
</html>
