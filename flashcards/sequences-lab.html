<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sequences Lab — Rules & nth Term</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --paper:#F2F4FB; --grid-line:#DBDEEE; --ink:#22243F; --ink-soft:#5E607D; --panel:#fff;
    --indigo:#5B53A8; --teal:#2E8B8B; --rose:#D6557A; --amber:#E0941F; --green:#2E8B6A;
    --red:#D6493E; --shadow:rgba(34,36,63,.14);
  }
  body { font-family:'Karla',sans-serif; color:var(--ink);
    background:linear-gradient(135deg,#ECEEFB 0%,#F4F1E8 100%); min-height:100vh; padding:1.25rem; }
  .wrap { max-width:880px; margin:0 auto; }
  header { text-align:center; margin-bottom:1rem; }
  h1 { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:clamp(1.7rem,4vw,2.4rem); }
  h1 .ic { color:var(--indigo); }
  .subtitle { color:var(--ink-soft); margin-top:.25rem; }
  .card { background:var(--panel); border-radius:16px; box-shadow:0 6px 18px var(--shadow); padding:1rem; margin-bottom:1rem; }
  .toolbar { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; justify-content:center; }
  .tlabel { font-weight:700; font-size:.8rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.1em; }

  .btn { font-family:'Karla',sans-serif; font-weight:700; font-size:.85rem; border:2px solid var(--ink);
    border-radius:999px; background:#fff; color:var(--ink); padding:.4rem 1rem; cursor:pointer;
    transition:all .15s; touch-action:manipulation; }
  .btn:hover { background:var(--ink); color:#fff; }
  .btn.on { background:var(--ink); color:#fff; }
  .btn:focus-visible { outline:3px solid var(--amber); outline-offset:2px; }

  .rule { font-family:'Space Grotesk',sans-serif; font-size:clamp(1.2rem,3.6vw,1.7rem); font-weight:700;
    text-align:center; margin:.2rem 0 .8rem; letter-spacing:.01em; }
  .rule .n { color:var(--indigo); } .rule .v { color:var(--teal); } .rule .d { color:var(--rose); }

  #seqWrap { width:100%; }
  #seq { width:100%; height:auto; display:block; }
  .hint { font-size:.82rem; color:var(--ink-soft); text-align:center; margin-top:.4rem; min-height:1rem; }

  .ctl-row { display:flex; gap:.6rem; align-items:center; flex-wrap:wrap; margin-bottom:.7rem; font-weight:700; font-size:.92rem; }
  .ctl-row input[type=number] { width:64px; font-family:'Karla',sans-serif; font-size:1rem; font-weight:700;
    text-align:center; border:2px solid var(--grid-line); border-radius:8px; padding:.3rem; color:var(--ink); }
  .ctl-row input[type=number]:focus { outline:none; border-color:var(--indigo); }
  .slider-row { margin:.6rem 0; }
  .slider-row label { font-weight:700; font-size:.92rem; display:flex; justify-content:space-between; align-items:baseline; }
  .slider-row label output { font-family:'Space Grotesk',sans-serif; font-size:1.15rem; }
  .slider-row.a output { color:var(--indigo); } .slider-row.b output { color:var(--rose); }
  input[type=range] { width:100%; margin-top:.3rem; }
  .slider-row.a input { accent-color:var(--indigo); } .slider-row.b input { accent-color:var(--rose); }

  .seg { display:inline-flex; gap:.35rem; flex-wrap:wrap; }
  .seg .btn { font-size:.8rem; padding:.35rem .8rem; }

  .panel-h { font-family:'Space Grotesk',sans-serif; font-size:.8rem; font-weight:700;
    text-transform:uppercase; letter-spacing:.12em; color:var(--ink-soft); margin-bottom:.6rem; }
  .work { font-size:.88rem; color:var(--ink-soft); line-height:1.6; } .work b { color:var(--ink); }
  .work .formula { font-family:'Space Grotesk',sans-serif; color:var(--indigo); }

  .toast { text-align:center; font-weight:700; padding:.5rem; border-radius:10px; margin-top:.5rem; min-height:1.2rem; }
  .toast.ok { background:#DDF2E9; color:var(--green); }
  .toast.bad { background:#FBE3E1; color:var(--red); }
  .toast.win { background:#EFEDFA; color:var(--indigo); font-size:1.04rem; }
  .toast:empty { display:none; }

  footer { text-align:center; color:var(--ink-soft); font-size:.78rem; margin-top:.5rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="ic">🪜</span> Sequences Lab</h1>
    <p class="subtitle">Build a sequence from its rule, read off the nth term, and learn to spot the pattern.</p>
  </header>

  <div class="card">
    <div class="toolbar">
      <span class="tlabel">Mode</span>
      <button class="btn mode on" data-mode="tt">Term-to-term</button>
      <button class="btn mode" data-mode="nth">nth term</button>
      <button class="btn mode" data-mode="find">Find the rule</button>
      <button class="btn mode" data-mode="special">Special sequences</button>
    </div>
  </div>

  <div class="card">
    <div class="rule" id="ruleText"></div>
    <div id="seqWrap"><svg id="seq" viewBox="0 0 760 210" aria-label="Sequence display"></svg></div>
    <div class="hint" id="hint"></div>
    <div class="toast" id="toast"></div>
  </div>

  <div class="card" id="controls"></div>

  <div class="card">
    <h2 class="panel-h">What's happening</h2>
    <div class="work" id="work"></div>
  </div>

  <footer>Sequences Lab · part of the little tutoring tools family</footer>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const NS = "http://www.w3.org/2000/svg";
function el(name, attrs, parent){ const e=document.createElementNS(NS,name); for(const k in attrs) e.setAttribute(k,attrs[k]); if(parent)parent.appendChild(e); return e; }
function randint(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }
function ord(n){ const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function signed(d){ return (d<0?'− ':'+ ')+Math.abs(d); }
function aTerm(a){ return a===1?'n':a===-1?'−n':(a<0?'−'+Math.abs(a):a)+'n'; }

let mode = 'tt';
const state = {
  tt:   { a:4, d:3, op:'add' },
  nth:  { a:3, b:1 },
  find: { a:3, b:1, revealed:false },
  special: 'square'
};

/* ---------- generic strip drawing ---------- */
function setView(h){ $('seq').setAttribute('viewBox', `0 0 760 ${h}`); }
function clearSvg(){ const s=$('seq'); s.innerHTML=''; return s; }

function drawStrip(terms, opts){
  opts = opts || {};
  const svg = clearSvg(); setView(210);
  const n = terms.length;
  const cw = 84, gap = 28;
  const totalW = n*cw + (n-1)*gap;
  const startX = (760 - totalW) / 2;
  const cy = 100, top = cy - 42;
  for (let i=0;i<n;i++){
    const x = startX + i*(cw+gap);
    el('rect', {x, y:top, width:cw, height:84, rx:14, fill:'var(--paper)', stroke:'var(--indigo)', 'stroke-width':2.5}, svg);
    // position label
    const pl = el('text', {x:x+cw/2, y:top-12, 'text-anchor':'middle', 'font-size':'14px', 'font-weight':'700',
      'font-family':'Space Grotesk', fill:'var(--ink-soft)'}, svg);
    pl.textContent = (opts.posLabels ? opts.posLabels[i] : 'n=' + (i+1));
    // value
    const txt = String(terms[i]);
    const fs = txt.length>=5 ? 20 : txt.length===4 ? 25 : 30;
    const vt = el('text', {x:x+cw/2, y:cy+11, 'text-anchor':'middle', 'font-size':fs+'px', 'font-weight':'700',
      'font-family':'Space Grotesk', fill:'var(--ink)'}, svg);
    vt.textContent = txt;
    // arrow + difference label to the next card
    if (i < n-1 && opts.diffs){
      const ax0 = x+cw+4, ax1 = x+cw+gap-4, ay = cy;
      el('line', {x1:ax0, y1:ay, x2:ax1-6, y2:ay, stroke:'var(--rose)', 'stroke-width':2.5}, svg);
      el('polygon', {points:`${ax1},${ay} ${ax1-8},${ay-5} ${ax1-8},${ay+5}`, fill:'var(--rose)'}, svg);
      const dl = el('text', {x:(ax0+ax1)/2, y:ay-12, 'text-anchor':'middle', 'font-size':'13px', 'font-weight':'700',
        'font-family':'Space Grotesk', fill:'var(--rose)'}, svg);
      dl.textContent = opts.diffs[i];
    }
  }
}

/* figurate dots for square / triangular numbers */
function drawFigurate(kind){
  const svg = clearSvg(); setView(230);
  const cols = 5, colW = 760/cols, r = 5, sp = 14, baseY = 175;
  for (let k=1;k<=cols;k++){
    const cx = (k-0.5)*colW;
    const fill = kind==='square' ? 'var(--teal)' : 'var(--rose)';
    if (kind==='square'){
      const w = (k-1)*sp;
      for (let row=0;row<k;row++) for (let c=0;c<k;c++)
        el('circle', {cx:cx - w/2 + c*sp, cy:baseY - (k-1)*sp + row*sp, r, fill}, svg);
    } else { // triangular: row r (0-indexed) has r+1 dots, centred
      for (let row=0;row<k;row++){
        const dotsInRow = row+1, w=(dotsInRow-1)*sp;
        for (let c=0;c<dotsInRow;c++)
          el('circle', {cx:cx - w/2 + c*sp, cy:baseY - row*sp, r, fill}, svg);
      }
    }
    const count = kind==='square' ? k*k : k*(k+1)/2;
    const lab = el('text', {x:cx, y:208, 'text-anchor':'middle', 'font-size':'22px', 'font-weight':'700',
      'font-family':'Space Grotesk', fill:'var(--ink)'}, svg);
    lab.textContent = count;
    const pl = el('text', {x:cx, y:30, 'text-anchor':'middle', 'font-size':'13px', 'font-weight':'700',
      'font-family':'Space Grotesk', fill:'var(--ink-soft)'}, svg);
    pl.textContent = 'n=' + k;
  }
}

/* ---------- term-to-term mode ---------- */
function renderTT(){
  const s = state.tt, count = 6;
  const terms = [s.a];
  for (let i=1;i<count;i++) terms.push(s.op==='add' ? terms[i-1]+s.d : terms[i-1]*s.d);
  const diffs = [];
  for (let i=0;i<count-1;i++) diffs.push(s.op==='add' ? signed(s.d) : '×'+s.d);
  drawStrip(terms, {diffs});
  if (s.op==='add'){
    $('ruleText').innerHTML = `Start at <span class="v">${s.a}</span>, then <span class="d">${signed(s.d)}</span> each time`;
    $('hint').textContent = 'A constant step makes an arithmetic (linear) sequence.';
    const a = s.d, b = s.a - s.d;
    $('work').innerHTML = `The <b>term-to-term rule</b> tells you how to get the <i>next</i> term: ${s.d<0?'subtract':'add'} <b>${Math.abs(s.d)}</b>.<br>
      Because the step is constant, you can also write a <b>position-to-term (nth term) rule</b>:
      <span class="formula">${fmtRule(a,b)}</span>.
      Check: put <b>n = 1</b> → ${fmtLinear(a,b,1)} = <b>${a*1+b}</b> ✓`;
  } else {
    $('ruleText').innerHTML = `Start at <span class="v">${s.a}</span>, then <span class="d">×${s.d}</span> each time`;
    $('hint').textContent = 'Multiplying by a fixed number makes a geometric sequence.';
    $('work').innerHTML = `Each term is the one before <b>× ${s.d}</b>. The terms grow by a constant <i>ratio</i>, not a constant difference —
      this is a <b>geometric</b> sequence, so there is no simple <span class="formula">an + b</span> rule.`;
  }
}
function fmtLinear(a,b,n){ return `${a}×${n} ${b<0?'− '+Math.abs(b):'+ '+b}`; }

/* ---------- nth-term mode ---------- */
function renderNth(){
  const s = state.nth, count = 6;
  const terms = []; for (let i=1;i<=count;i++) terms.push(s.a*i + s.b);
  drawStrip(terms, {diffs: terms.slice(1).map((t,i)=>signed(terms[i+1]-terms[i]))});
  $('ruleText').innerHTML = `nth term = <span class="n">${aTerm(s.a)}</span> <span class="d">${s.b<0?'− '+Math.abs(s.b):'+ '+s.b}</span>`;
  $('hint').textContent = 'Slide a and b — the first difference always equals a.';
  let rows = '';
  for (let i=1;i<=4;i++) rows += `<tr><td>${i}</td><td>${s.a}×${i} ${s.b<0?'− '+Math.abs(s.b):'+ '+s.b}</td><td><b>${s.a*i+s.b}</b></td></tr>`;
  $('work').innerHTML = `Put the <b>position</b> n into the rule to get the <b>term</b>:
    <table style="width:100%;border-collapse:collapse;margin:.5rem 0;text-align:center;font-variant-numeric:tabular-nums">
      <tr style="font-family:Space Grotesk"><th style="border:1px solid var(--grid-line);padding:.25rem">n</th>
      <th style="border:1px solid var(--grid-line);padding:.25rem">a·n + b</th>
      <th style="border:1px solid var(--grid-line);padding:.25rem">term</th></tr>${rows}</table>
    The <b>common difference</b> is <b>${s.a}</b> (the value of a), and the rule lands on <b>${s.a+s.b}</b> when n = 1.`;
}

/* ---------- find-the-rule mode ---------- */
function newFind(){
  const f = state.find;
  f.a = randint(2,6) * (Math.random()<0.25?-1:1);
  f.b = randint(-5,9);
  f.revealed = false;
  renderFind();
  $('toast').className='toast'; $('toast').textContent='';
  if ($('findA')){ $('findA').value=''; $('findB').value=''; }
}
function renderFind(){
  const f = state.find, count = 5;
  const terms = []; for (let i=1;i<=count;i++) terms.push(f.a*i + f.b);
  drawStrip(terms, {diffs: terms.slice(1).map((t,i)=>signed(terms[i+1]-terms[i]))});
  $('ruleText').innerHTML = `Find the rule:  <span class="v">${terms.join(',  ')},  …</span>`;
  $('hint').textContent = 'What is the nth term? Type a and b, then Check.';
}

/* ---------- special sequences ---------- */
const SPECIALS = {
  square:     { name:'Square numbers',      terms:[1,4,9,16,25,36], rule:'n²', desc:'n × n — dots that build a square.' },
  triangular: { name:'Triangular numbers',  terms:[1,3,6,10,15,21], rule:'½n(n+1)', desc:'add 2, then 3, then 4 … — dots that build a triangle.' },
  cube:       { name:'Cube numbers',        terms:[1,8,27,64,125,216], rule:'n³', desc:'n × n × n.' },
  fib:        { name:'Fibonacci',           terms:[1,1,2,3,5,8,13], rule:'add the two before', desc:'each term is the sum of the previous two.' },
  pow2:       { name:'Powers of 2',         terms:[1,2,4,8,16,32,64], rule:'2ⁿ', desc:'double each time (geometric).' }
};
function renderSpecial(){
  const key = state.special, sp = SPECIALS[key];
  if (key==='square' || key==='triangular') drawFigurate(key);
  else {
    let diffs = null;
    if (key==='fib') diffs = sp.terms.slice(1).map((t,i)=> i===0 ? '' : '+'+(sp.terms[i-1]));
    else if (key==='pow2') diffs = sp.terms.slice(1).map(()=> '×2');
    else diffs = sp.terms.slice(1).map((t,i)=> '+'+(sp.terms[i+1]-sp.terms[i]));
    drawStrip(sp.terms, {diffs});
  }
  $('ruleText').innerHTML = `<span class="v">${sp.name}</span> — rule: <span class="d">${sp.rule}</span>`;
  $('hint').textContent = sp.desc;
  $('work').innerHTML = `<b>${sp.name}:</b> ${sp.terms.join(', ')}, …<br>` + ({
    square: 'The 1st four differences are 3, 5, 7, 9 — the <b>odd numbers</b>. Square numbers are a <b>quadratic</b> sequence (nth term n²), met fully in Year 9.',
    triangular: 'Differences are 1, 2, 3, 4, … — they go up by one each time. The nth term is <span class="formula">½ n (n + 1)</span>.',
    cube: 'Each cube is n × n × n: 1, 8, 27, 64, … The nth term is <span class="formula">n³</span>.',
    fib: 'Start 1, 1. After that each term is the <b>sum of the previous two</b>: 1+1=2, 1+2=3, 2+3=5, … This is a <b>term-to-term</b> rule only.',
    pow2: 'Double each time: ×2, ×2, … A <b>geometric</b> sequence with nth term <span class="formula">2ⁿ</span>.'
  }[key]);
}

/* ---------- controls per mode ---------- */
function renderControls(){
  const c = $('controls');
  if (mode==='tt'){
    const s = state.tt;
    c.innerHTML = `
      <div class="ctl-row">
        <label>First term <input type="number" id="ttA" value="${s.a}" min="-20" max="20"></label>
        <div class="seg">
          <button class="btn${s.op==='add'?' on':''}" data-ttop="add">+ add each time</button>
          <button class="btn${s.op==='mul'?' on':''}" data-ttop="mul">× multiply each time</button>
        </div>
        <label><span id="ttDname">step</span> <input type="number" id="ttD" value="${s.d}" min="-10" max="10"></label>
      </div>`;
    $('ttDname').textContent = s.op==='add' ? 'step' : 'ratio';
    $('ttA').oninput = ()=>{ s.a = clampInt($('ttA').value,-20,20); renderTT(); };
    $('ttD').oninput = ()=>{ s.d = clampInt($('ttD').value,-10,10) || (s.op==='mul'?2:1); renderTT(); };
    c.querySelectorAll('[data-ttop]').forEach(b=> b.onclick=()=>{
      s.op=b.dataset.ttop;
      if (s.op==='mul' && s.d<2) { s.d=2; }
      renderControls(); renderTT();
    });
  }
  else if (mode==='nth'){
    const s = state.nth;
    c.innerHTML = `
      <div class="slider-row a"><label>a  (multiplier of n) <output id="oa">${s.a}</output></label>
        <input type="range" id="nthA" min="-6" max="9" step="1" value="${s.a}"></div>
      <div class="slider-row b"><label>b  (the constant) <output id="ob">${s.b}</output></label>
        <input type="range" id="nthB" min="-12" max="12" step="1" value="${s.b}"></div>
      <div class="ctl-row" style="border-top:1px dashed var(--grid-line);padding-top:.7rem;margin-top:.2rem">
        Is <input type="number" id="nthQ" value="${s.a*4+s.b}"> in this sequence?
        <button class="btn" id="nthCheck">Check</button>
        <span id="nthAns" style="font-weight:700"></span>
      </div>`;
    $('nthA').oninput = ()=>{ s.a=+$('nthA').value; $('oa').textContent=s.a; renderNth(); };
    $('nthB').oninput = ()=>{ s.b=+$('nthB').value; $('ob').textContent=s.b; renderNth(); };
    $('nthCheck').onclick = checkInSequence;
  }
  else if (mode==='find'){
    c.innerHTML = `
      <p style="font-weight:700;margin-bottom:.6rem">Work out the nth-term rule, then check it.</p>
      <div class="ctl-row">
        nth term = <input type="number" id="findA" placeholder="a"> n
        <span>+</span> <input type="number" id="findB" placeholder="b">
        <button class="btn" id="findCheck">Check</button>
        <button class="btn" id="findReveal">Reveal method</button>
        <button class="btn" id="findNew" style="margin-left:auto">↻ New sequence</button>
      </div>
      <div class="work" id="findMethod" style="margin-top:.4rem"></div>`;
    $('findCheck').onclick = checkFind;
    $('findReveal').onclick = revealFind;
    $('findNew').onclick = newFind;
    $('work').innerHTML = `In an <b>arithmetic</b> sequence the terms go up (or down) by the same amount each time.
      The <b>common difference</b> is the multiplier <b>a</b>; then choose <b>b</b> so that n = 1 gives the first term.`;
  }
  else if (mode==='special'){
    const keys = Object.keys(SPECIALS);
    c.innerHTML = `<div class="seg" style="justify-content:center">` +
      keys.map(k=>`<button class="btn${k===state.special?' on':''}" data-sp="${k}">${SPECIALS[k].name}</button>`).join('') + `</div>`;
    c.querySelectorAll('[data-sp]').forEach(b=> b.onclick=()=>{
      state.special=b.dataset.sp;
      c.querySelectorAll('[data-sp]').forEach(x=>x.classList.toggle('on', x===b));
      renderSpecial();
    });
  }
}
function clampInt(v,lo,hi){ let n=parseInt(v); if(isNaN(n)) n=0; return Math.max(lo,Math.min(hi,n)); }

function checkInSequence(){
  const s = state.nth, target = parseInt($('nthQ').value);
  const ans = $('nthAns');
  if (isNaN(target)){ ans.textContent=''; return; }
  // term = a*n + b  →  n = (target - b)/a
  if (s.a===0){ ans.style.color='var(--ink-soft)'; ans.textContent = (target===s.b?'every term is '+s.b:'no — every term is '+s.b); return; }
  const n = (target - s.b) / s.a;
  if (Number.isInteger(n) && n>=1){ ans.style.color='var(--green)'; ans.textContent = `yes — it's the ${ord(n)} term (n = ${n})`; }
  else { ans.style.color='var(--red)'; ans.textContent = `no — n = (${target} ${s.b<0?'+ '+Math.abs(s.b):'− '+s.b}) ÷ ${s.a} = ${(+n.toFixed(2))}, not a whole position`; }
}

function checkFind(){
  const f = state.find;
  const ga = parseInt($('findA').value), gb = parseInt($('findB').value);
  if (isNaN(ga) || isNaN(gb)){ flash('Type a value for both a and b.', 'bad'); return; }
  if (ga===f.a && gb===f.b){ flash(`🎉 Correct! nth term = ${fmtRule(f.a,f.b)}`, 'win'); }
  else {
    const t1 = f.a+f.b;
    flash(`Not yet — check the common difference (a) and that n = 1 gives ${t1}.`, 'bad');
  }
}
function revealFind(){
  const f = state.find;
  state.find.revealed = true;
  const t1 = f.a+f.b;
  $('findMethod').innerHTML = `<b>Method:</b> the terms change by <b>${signed(f.a)}</b> each step, so <b>a = ${f.a}</b>.<br>
    Then n = 1 must give the first term <b>${t1}</b>:  ${f.a}×1 + b = ${t1}, so <b>b = ${f.b}</b>.<br>
    nth term = <span class="formula">${fmtRule(f.a,f.b)}</span>.`;
  flash(`Answer: nth term = ${fmtRule(f.a,f.b)}`, 'ok');
}
function fmtRule(a,b){ const aPart=aTerm(a); return b===0?aPart:`${aPart} ${b<0?'− '+Math.abs(b):'+ '+b}`; }
function flash(msg, cls){ const t=$('toast'); t.className='toast '+cls; t.textContent=msg; }

/* ---------- mode switching ---------- */
function render(){
  if (mode==='tt') renderTT();
  else if (mode==='nth') renderNth();
  else if (mode==='find') renderFind();
  else if (mode==='special') renderSpecial();
}
function switchMode(m){
  mode = m;
  $('toast').className='toast'; $('toast').textContent='';
  renderControls();
  if (m==='find' && !state.find.revealed && state.find.a===3 && state.find.b===1) newFind();
  else render();
}

document.querySelectorAll('.mode').forEach(b => b.addEventListener('click', ()=>{
  document.querySelectorAll('.mode').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); switchMode(b.dataset.mode);
}));

renderControls();
render();
</script>
