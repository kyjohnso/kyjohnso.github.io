<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resurrection Vocabulary</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Karla:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --accent: #8E5BC4;
            --accent-dark: #5E3A8C;
            --term: #4A2A73;
            --shadow: rgba(0, 0, 0, 0.15);
        }
        body {
            font-family: 'Karla', sans-serif;
            background: linear-gradient(135deg, #F3ECFA 0%, #E2D2F2 50%, #D3BFEC 100%);
            min-height: 100vh; padding: 2rem; position: relative; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(142,91,196,0.10) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(142,91,196,0.10) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        .header { text-align: center; margin-bottom: 1.5rem; position: relative; z-index: 1; }
        h1 {
            font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 700;
            color: var(--term); text-shadow: 2px 2px 0px rgba(142,91,196,0.10); letter-spacing: 1px; margin-bottom: 0.5rem;
        }
        .subtitle { font-size: 1.1rem; color: var(--accent-dark); font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
        .legend {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 0.6rem 1.2rem;
            max-width: 1000px; margin: 0 auto 1.5rem; position: relative; z-index: 1;
        }
        .legend-item { display: flex; align-items: center; gap: 0.45rem; font-size: 0.85rem; font-weight: 600; color: #555; }
        .legend-swatch { width: 18px; height: 18px; border-radius: 5px; box-shadow: 0 1px 3px var(--shadow); }
        .controls { text-align: center; margin-bottom: 2rem; position: relative; z-index: 1; }
        button {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white; border: none; padding: 0.8rem 2rem; font-size: 1rem; font-weight: 600;
            border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px var(--shadow);
            transition: all 0.3s ease; font-family: 'Karla', sans-serif; margin: 0 0.5rem;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
        button:active { transform: translateY(0); }
        .cards-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem; max-width: 1400px; margin: 0 auto; position: relative; z-index: 1;
        }
        .card-wrapper { perspective: 1000px; height: 200px; position: relative; }
        .card {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1); cursor: pointer;
        }
        .card-wrapper:hover .card { transform: translateY(-4px) rotateX(5deg); }
        .card.flipped { transform: rotateY(180deg); }
        .card-wrapper:hover .card.flipped { transform: rotateY(180deg) translateY(-4px) rotateX(5deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            box-shadow: 0 8px 30px var(--shadow); border: 2px solid rgba(255, 255, 255, 0.5);
        }
        .card-front {
            background: linear-gradient(135deg, #FFFFFF 0%, #F8F3FC 100%);
            border-left: 5px solid var(--c1);
        }
        .card-back {
            background: linear-gradient(135deg, var(--c1) 0%, var(--c2) 100%);
            transform: rotateY(180deg); color: white;
        }
        .term {
            font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 700;
            color: var(--c2); margin-bottom: 0.4rem; letter-spacing: 0.5px;
        }
        .section-tag { font-size: 0.68rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--c1); opacity: 0.85; }
        .card-back .section-tag { color: rgba(255,255,255,0.85); }
        .definition { font-size: 0.92rem; line-height: 1.45; color: rgba(255, 255, 255, 0.97); font-weight: 400; }
        .card-icon { position: absolute; top: 0.5rem; left: 0.7rem; font-size: 1.5rem; line-height: 1; }
        .card-number {
            position: absolute; top: 0.5rem; right: 0.75rem; font-size: 0.75rem; font-weight: 600;
            color: var(--c2); opacity: 0.55;
        }
        .card-back .card-number { color: rgba(255,255,255,0.7); }
        .flip-hint { position: absolute; bottom: 0.5rem; font-size: 0.7rem; opacity: 0.5; font-weight: 500; letter-spacing: 1px; }
        .card-front .flip-hint { color: var(--c2); }
        .card-back .flip-hint { color: rgba(255, 255, 255, 0.7); }
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .cards-container { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
            .card-wrapper { height: 185px; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-wrapper { animation: fadeIn 0.5s ease-out; animation-fill-mode: both; }
        .card-wrapper:nth-child(1) { animation-delay: 0.05s; }
        .card-wrapper:nth-child(2) { animation-delay: 0.1s; }
        .card-wrapper:nth-child(3) { animation-delay: 0.15s; }
        .card-wrapper:nth-child(4) { animation-delay: 0.2s; }
        .card-wrapper:nth-child(5) { animation-delay: 0.25s; }
        .card-wrapper:nth-child(6) { animation-delay: 0.3s; }
        .card-wrapper:nth-child(7) { animation-delay: 0.35s; }
        .card-wrapper:nth-child(8) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Resurrection Vocabulary</h1>
        <p class="subtitle">50 Essential Terms</p>
    </div>

    <div class="legend" id="legend"></div>

    <div class="controls">
        <button onclick="flipAllCards()">Flip All Cards</button>
        <button onclick="shuffleCards()">Shuffle Cards</button>
        <button onclick="resetCards()">Reset Layout</button>
    </div>

    <div class="cards-container" id="cardsContainer"></div>

    <script>
        const sections = {
            "1": {
                        "name": "The Death of Jesus",
                        "c1": "#8E6FC0",
                        "c2": "#5E3A8C"
            },
            "2": {
                        "name": "The Resurrection of Jesus",
                        "c1": "#B07CC9",
                        "c2": "#7A4A9E"
            },
            "3": {
                        "name": "Life After Death",
                        "c1": "#6E7FD0",
                        "c2": "#3F4F9E"
            },
            "4": {
                        "name": "Reincarnation & Karma",
                        "c1": "#C97BA8",
                        "c2": "#944870"
            },
            "5": {
                        "name": "Humanism, Science & Death",
                        "c1": "#8593A5",
                        "c2": "#54616E"
            }
};
        const vocabularyData = [
            {"term": "ATONEMENT", "definition": "Making up for something wrong you have done, especially sin, to restore a relationship with God or make it 'at-one'.", "section": "1", "icon": "🩹"},
            {"term": "CRUCIFIXION", "definition": "A way of killing someone by nailing or tying them to a wooden cross. This is how Jesus died.", "section": "1", "icon": "✝️"},
            {"term": "GAN EDEN", "definition": "In later Jewish belief, a peaceful place after death where good people are close to God (like Eden, paradise).", "section": "1", "icon": "🌳"},
            {"term": "GEHINNOM", "definition": "In later Jewish belief, a place where souls are cleaned or punished for a time after death.", "section": "1", "icon": "♨️"},
            {"term": "GOSPELS", "definition": "The first four books of the New Testament that tell the story of Jesus' life and teachings. 'Good news'.", "section": "1", "icon": "📖"},
            {"term": "MESSIAH", "definition": "Saviour. A long-promised leader sent by God to restore the covenant permanently. Christ.", "section": "1", "icon": "👑"},
            {"term": "PASSOVER", "definition": "A Jewish festival that remembers when God freed the Israelites from slavery in Egypt.", "section": "1", "icon": "🐑"},
            {"term": "RECONCILIATION", "definition": "Making peace again after a disagreement or falling out.", "section": "1", "icon": "🤝"},
            {"term": "SACRIFICE", "definition": "Giving up something important for a reason, often to show love, faith, or obedience to God.", "section": "1", "icon": "🎁"},
            {"term": "SHEOL", "definition": "In early Jewish belief, the place where all souls go after death, without reward or punishment.", "section": "1", "icon": "🕳️"},
            {"term": "ASCENSION", "definition": "When Jesus went up to heaven after coming back to life.", "section": "2", "icon": "⬆️"},
            {"term": "CREDIBILITY", "definition": "How believable or trustworthy something or someone is.", "section": "2", "icon": "🧐"},
            {"term": "EASTER SUNDAY", "definition": "The Christian festival that celebrates Jesus rising from the dead.", "section": "2", "icon": "🌅"},
            {"term": "ETERNAL LIFE", "definition": "Living forever, usually meaning life with God after death.", "section": "2", "icon": "♾️"},
            {"term": "EVIDENCE", "definition": "Facts or information that show something is true.", "section": "2", "icon": "🔍"},
            {"term": "FAITH", "definition": "Believing in something, especially God, even beyond the evidence.", "section": "2", "icon": "🙏"},
            {"term": "GOOD FRIDAY", "definition": "The day Christians remember the death of Jesus on the cross.", "section": "2", "icon": "🕯️"},
            {"term": "HEAVEN", "definition": "A place where God lives, where people go after death to be with Him.", "section": "3", "icon": "😇"},
            {"term": "HELL", "definition": "A place of punishment after death for those who reject God.", "section": "3", "icon": "🔥"},
            {"term": "RESURRECTION", "definition": "Coming back to life after death.", "section": "3", "icon": "🌱"},
            {"term": "DAY OF JUDGEMENT", "definition": "The time when God judges everyone's lives and decides what happens to them after death.", "section": "3", "icon": "⚖️"},
            {"term": "ETERNAL", "definition": "Lasting forever, with no end.", "section": "3", "icon": "⏳"},
            {"term": "EXCLUSIVISM", "definition": "The belief that only baptised Christians can enter heaven.", "section": "3", "icon": "🚪"},
            {"term": "GRACE", "definition": "God's free gift of love and forgiveness, given to people even though they do not deserve it.", "section": "3", "icon": "💝"},
            {"term": "METAPHOR", "definition": "A way of describing something by saying it is something else to help explain it.", "section": "3", "icon": "🎭"},
            {"term": "PROTESTANTISM", "definition": "A branch of Christianity that began as a protest against the Roman Catholic Church in the 17th Century.", "section": "3", "icon": "⛪"},
            {"term": "PURGATORY", "definition": "For Roman Catholics, this is a temporary Hell where souls are made pure before going to heaven.", "section": "3", "icon": "🌫️"},
            {"term": "ROMAN CATHOLICISM", "definition": "The largest branch of Christianity, led by the Pope.", "section": "3", "icon": "🔑"},
            {"term": "UNIVERSALISM", "definition": "The belief that everyone will eventually be saved and go to heaven.", "section": "3", "icon": "🌐"},
            {"term": "ATMA", "definition": "Sikh word for the soul or life-energy within a living being.", "section": "4", "icon": "🫧"},
            {"term": "ATMAN", "definition": "Hindu word for the eternal soul or life-energy within a person or living being, which is part of Brahman.", "section": "4", "icon": "🔆"},
            {"term": "BRAHMAN", "definition": "The one ultimate reality or spirit in Hinduism that is present everywhere and in everything.", "section": "4", "icon": "🌌"},
            {"term": "DHARMA", "definition": "A person's duty or the right way to live and behave.", "section": "4", "icon": "☸️"},
            {"term": "KARMA", "definition": "The idea that actions have consequences; good actions lead to good results, and bad actions lead to bad results.", "section": "4", "icon": "☯️"},
            {"term": "MOKSHA", "definition": "Hindu word for freedom from the cycle of rebirth, when the soul becomes one with Brahman.", "section": "4", "icon": "🕊️"},
            {"term": "MUKTI", "definition": "Sikh word for moksha, meaning release from the cycle of rebirth into Waheguru.", "section": "4", "icon": "🔓"},
            {"term": "REINCARNATION (REBIRTH)", "definition": "The belief that after death, the soul is born again into a new body.", "section": "4", "icon": "♻️"},
            {"term": "SAMSARA", "definition": "The continuous cycle of birth, death, and rebirth.", "section": "4", "icon": "🔄"},
            {"term": "WAHEGURU", "definition": "The name for God in Sikhism, meaning the wonderful teacher who guides people.", "section": "4", "icon": "🙌"},
            {"term": "ATHEISM", "definition": "Belief that there is no God or gods.", "section": "5", "icon": "🚫"},
            {"term": "AGNOSTICISM", "definition": "Belief that we cannot know if God exists or not.", "section": "5", "icon": "🤷"},
            {"term": "CONSCIOUSNESS", "definition": "Awareness of yourself and the world around you.", "section": "5", "icon": "🧠"},
            {"term": "DUALISM (DUALIST)", "definition": "The belief that humans are made of two separate parts: the physical body and a non-physical mind or soul, which may continue after the body dies.", "section": "5", "icon": "👥"},
            {"term": "HUMANISM", "definition": "A belief system that focuses on human life, reason, and ethics without religion.", "section": "5", "icon": "🧑"},
            {"term": "NEAR-DEATH EXPERIENCE", "definition": "Unusual experiences reported by some people when they are close to death, such as seeing light or feeling peaceful.", "section": "5", "icon": "✨"},
            {"term": "NON-RELIGIOUS", "definition": "Not based on belief in God or religion.", "section": "5", "icon": "⛔"},
            {"term": "SCIENTIFIC MATERIALISM", "definition": "The belief that only physical things exist (no soul or afterlife).", "section": "5", "icon": "🔬"},
            {"term": "SECULAR", "definition": "Separate from religion.", "section": "5", "icon": "✂️"},
            {"term": "SOUL", "definition": "The non-physical part of a person that some people believe is their true self and continues after death. It is often thought of as the part that contains thoughts, feelings, and identity.", "section": "5", "icon": "👻"},
            {"term": "WORLDVIEW", "definition": "A person's overall way of seeing and understanding the world, shaped by their beliefs, values, and experiences.", "section": "5", "icon": "🌍"}
        ];
        const COUNT = vocabularyData.length;

        function buildLegend() {
            const el = document.getElementById('legend');
            el.innerHTML = Object.keys(sections).map(k => {
                const s = sections[k];
                return `<div class="legend-item">
                    <span class="legend-swatch" style="background:linear-gradient(135deg, ${s.c1}, ${s.c2})"></span>
                    ${s.name}
                </div>`;
            }).join('');
        }

        function createCard(data, index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'card-wrapper';
            wrapper.dataset.index = index;
            const s = sections[data.section];
            const style = `--c1:${s.c1};--c2:${s.c2};`;
            wrapper.innerHTML = `
                <div class="card" style="${style}">
                    <div class="card-face card-front">
                        <span class="card-icon">${data.icon}</span>
                        <span class="card-number">${index + 1}/${COUNT}</span>
                        <div class="term">${data.term}</div>
                        <div class="section-tag">${s.name}</div>
                        <span class="flip-hint">TAP TO FLIP</span>
                    </div>
                    <div class="card-face card-back">
                        <span class="card-icon">${data.icon}</span>
                        <span class="card-number">${index + 1}/${COUNT}</span>
                        <div class="definition">${data.definition}</div>
                        <span class="flip-hint">TAP TO FLIP</span>
                    </div>
                </div>
            `;
            wrapper.addEventListener('click', function() {
                this.querySelector('.card').classList.toggle('flipped');
            });
            return wrapper;
        }

        function initializeCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            vocabularyData.forEach((data, index) => container.appendChild(createCard(data, index)));
        }
        function flipAllCards() { document.querySelectorAll('.card').forEach(c => c.classList.toggle('flipped')); }
        function shuffleCards() {
            const container = document.getElementById('cardsContainer');
            const cards = Array.from(container.children);
            for (let i = cards.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); container.appendChild(cards[j]); }
        }
        function resetCards() {
            const container = document.getElementById('cardsContainer');
            const cards = Array.from(container.children);
            cards.sort((a, b) => parseInt(a.dataset.index) - parseInt(b.dataset.index));
            cards.forEach(card => { container.appendChild(card); card.querySelector('.card').classList.remove('flipped'); });
        }
        buildLegend();
        initializeCards();
    </script>
</body>
</html>
